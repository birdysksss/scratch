<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Neon Scratch Card</title>

<style>

:root{
--neon-pink:#ff007f;
--dark-bg:#0a0a0a;
--glass:rgba(255,255,255,0.05);
}

body{
background-color:var(--dark-bg);
background-image:
radial-gradient(circle at 20% 30%,rgba(255,0,127,0.05)0%,transparent 40%),
radial-gradient(circle at 80% 70%,rgba(255,0,127,0.05)0%,transparent 40%);
color:white;
font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
overflow:hidden;
}

h1{
font-weight:200;
text-transform:uppercase;
letter-spacing:8px;
color:#fff;
text-shadow:0 0 10px var(--neon-pink),0 0 20px var(--neon-pink);
margin-bottom:40px;
font-size:1.8rem;
animation:pulse 2s infinite alternate;
}

@keyframes pulse{
from{opacity:0.8;text-shadow:0 0 10px var(--neon-pink);}
to{opacity:1;text-shadow:0 0 25px var(--neon-pink),0 0 40px var(--neon-pink);}
}

.card-wrapper{
position:relative;
padding:10px;
background:linear-gradient(45deg,var(--neon-pink),#ff5e62,var(--neon-pink));
background-size:200% 200%;
animation:gradientBorder 4s linear infinite;
border-radius:25px;
box-shadow:0 0 30px rgba(255,0,127,0.3);
}

@keyframes gradientBorder{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* RESPONSIVE CARD */

.zreb-container{
position:relative;
width:90vw;
max-width:340px;
aspect-ratio:1/1;
background:#fff;
border-radius:20px;
overflow:hidden;
z-index:5;
transition:transform 0.8s cubic-bezier(0.34,1.56,0.64,1);
}

.zreb-container.expanded{
transform:scale(1.15) rotate(2deg);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

#obrazok-vyhry{
position:absolute;
width:100%;
height:100%;
padding:35px;
box-sizing:border-box;
object-fit:contain;
z-index:1;
}

#stieracia-vrstva{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:2;
touch-action:none;
}

.heart-particle{
position:fixed;
pointer-events:none;
z-index:100;
filter:drop-shadow(0 0 5px var(--neon-pink));
}

button{
margin-top:50px;
padding:15px 40px;
background:var(--glass);
backdrop-filter:blur(10px);
color:white;
border:1px solid rgba(255,255,255,0.1);
font-size:0.9rem;
font-weight:bold;
text-transform:uppercase;
letter-spacing:2px;
cursor:pointer;
border-radius:12px;
transition:all 0.3s ease;
}

button:hover{
background:var(--neon-pink);
box-shadow:0 0 30px var(--neon-pink);
border-color:transparent;
transform:translateY(-5px);
}

button:active{transform:translateY(0);}

/* MOBILE */

@media(max-width:500px){

h1{
font-size:1.3rem;
letter-spacing:4px;
margin-bottom:25px;
}

button{
margin-top:30px;
padding:12px 28px;
font-size:0.8rem;
}

#obrazok-vyhry{
padding:20px;
}

}

</style>
</head>

<body>

<h1>SCRATCH YOUR CARD</h1>

<div class="card-wrapper">
<div class="zreb-container" id="karta">

<img id="obrazok-vyhry" src="">

<canvas id="stieracia-vrstva"></canvas>

</div>
</div>

<button onclick="restartHry()">NEXT CARD</button>

<script>

const canvas=document.getElementById('stieracia-vrstva');
const ctx=canvas.getContext('2d',{willReadFrequently:true});
const img=document.getElementById('obrazok-vyhry');
const karta=document.getElementById('karta');

const zoznamObrazkov=['fajka1.png','fajka2.png','fajka3.png'];

let isDrawing=false;
let uzZotrete=false;

/* CANVAS RESIZE FOR MOBILE */

function resizeCanvas(){

const size=karta.offsetWidth;

canvas.width=size;
canvas.height=size;

}

window.addEventListener("resize",resizeCanvas);
resizeCanvas();

function restartHry(){

uzZotrete=false;

karta.classList.remove('expanded');

canvas.style.opacity="1";
canvas.style.pointerEvents="auto";

const nahodne=Math.floor(Math.random()*zoznamObrazkov.length);

img.src=zoznamObrazkov[nahodne];

ctx.globalCompositeOperation='source-over';

const grad=ctx.createLinearGradient(0,0,canvas.width,canvas.height);

grad.addColorStop(0,'#1a1a1a');
grad.addColorStop(0.5,'#2a2a2a');
grad.addColorStop(1,'#1a1a1a');

ctx.fillStyle=grad;

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.shadowBlur=15;
ctx.shadowColor="#ff007f";
ctx.fillStyle="#ff007f";

ctx.font="bold 20px Arial";

ctx.textAlign="center";

ctx.fillText("SCRATCH ❤️",canvas.width/2,canvas.height/2);

ctx.shadowBlur=0;

ctx.globalCompositeOperation='destination-out';

}

function skontrolujPercenta(){

if(uzZotrete)return;

const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;

let transparent=0;

for(let i=3;i<data.length;i+=4){

if(data[i]===0)transparent++;

}

if((transparent/(data.length/4))*100>40){

finalnyVybuch();

}

}

function finalnyVybuch(){

uzZotrete=true;

canvas.style.opacity="0";

canvas.style.pointerEvents="none";

karta.classList.add('expanded');

for(let i=0;i<60;i++){

vytvorSrdce(window.innerWidth/2,window.innerHeight/2,true);

}

}

function vytvorSrdce(x,y,isExplosion){

const el=document.createElement('div');

el.innerHTML='❤️';

el.className='heart-particle';

document.body.appendChild(el);

const size=Math.random()*20+15;

el.style.fontSize=`${size}px`;

el.style.left=`${x}px`;

el.style.top=`${y}px`;

const destX=(Math.random()-0.5)*(isExplosion?1000:300);

const destY=isExplosion?(Math.random()-0.5)*1000:-700;

const anim=el.animate([

{transform:'translate(0,0) scale(1)',opacity:1},

{transform:`translate(${destX}px,${destY}px) scale(0)`,opacity:0}

],{

duration:isExplosion?2000:3000,

easing:'cubic-bezier(0.1,0.8,0.4,1)'

});

anim.onfinish=()=>el.remove();

}

function stieraj(e){

if(!isDrawing)return;

const rect=canvas.getBoundingClientRect();

const posX=e.clientX||e.touches[0].clientX;

const posY=e.clientY||e.touches[0].clientY;

const x=posX-rect.left;

const y=posY-rect.top;

ctx.beginPath();

ctx.arc(x,y,35,0,Math.PI*2);

ctx.fill();

if(Math.random()>0.9){

vytvorSrdce(posX,posY,false);

}

skontrolujPercenta();

}

canvas.addEventListener('mousedown',()=>isDrawing=true);

window.addEventListener('mouseup',()=>isDrawing=false);

canvas.addEventListener('mousemove',stieraj);

canvas.addEventListener('touchstart',(e)=>{isDrawing=true;e.preventDefault();});

canvas.addEventListener('touchend',()=>isDrawing=false);

canvas.addEventListener('touchmove',(e)=>{stieraj(e);e.preventDefault();});

restartHry();

</script>

</body>
</html>
